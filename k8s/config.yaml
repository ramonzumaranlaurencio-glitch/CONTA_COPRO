apiVersion: v1
kind: ConfigMap
metadata:
  name: contapro-config
data:
  APP_ENV: "staging"
  CORS_ORIGINS: "https://erp.example.com"
  GEMINI_MODEL: "gemini-1.5-pro"
  SUNAT_XSD_DIR: "/app/xsd"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
---
apiVersion: v1
kind: Secret
metadata:
  name: contapro-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://contapro:change-me@postgres:5432/contapro"
  REDIS_URL: "redis://redis:6379/0"
  LEDGER_HMAC_SECRET: "replace-with-min-32-char-secret"
  GEMINI_API_KEY: ""
  SUNAT_ENDPOINT: ""
  SUNAT_RUC: ""
  SUNAT_SOL_USER: ""
  SUNAT_SOL_PASSWORD: ""
  P12_CERT_PATH: "/run/secrets/sunat_cert.p12"
  P12_CERT_PASSWORD: ""
